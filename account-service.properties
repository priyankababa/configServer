spring.application.name=account-service
server.port=8082

# MySQL Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/bankdb
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Eureka
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

#Swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher


logging.level.root=INFO
logging.level.org.springframework=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.feign=ERROR


#Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.simple.metrics.export.enabled=true
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.slidingWindowSize=5
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userServiceCircuitBreaker.minimumNumberOfCalls=5

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${HOSTNAME}

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
